<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClinicLink Dashboard</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { color: #2a9d8f; }
    .handoff { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    .handoff h3 { margin: 0 0 0.5rem; }
    .meta { color: #666; font-size: 0.9rem; }
    button { background: #2a9d8f; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; }
    button:disabled { background: #999; }
  </style>
</head>
<body>
  <h1>ClinicLink Dashboard</h1>
  <div id="app">
    <p>Loading handoffs...</p>
  </div>

  <script>
    const app = document.getElementById('app');
    const token = sessionStorage.getItem('clinic_token') || prompt('Enter clinic token:');
    if (token) sessionStorage.setItem('clinic_token', token);

    function clearApp() {
      while (app.firstChild) {
        app.removeChild(app.firstChild);
      }
    }

    function createTextElement(tag, text) {
      const el = document.createElement(tag);
      el.textContent = text;
      return el;
    }

    async function loadHandoffs() {
      const res = await fetch('/handoffs?status=pending', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 403) {
        clearApp();
        app.appendChild(createTextElement('p', 'Invalid clinic token. Please refresh and try again.'));
        return;
      }
      const handoffs = await res.json();
      clearApp();
      if (handoffs.length === 0) {
        app.appendChild(createTextElement('p', 'No pending handoffs.'));
        return;
      }
      for (const h of handoffs) {
        const card = document.createElement('div');
        card.className = 'handoff';
        card.id = 'ho-' + h.handoff_id;

        const title = document.createElement('h3');
        title.textContent = h.patient_id + ' — ' + (h.chief_complaint || 'No complaint recorded');
        card.appendChild(title);

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = 'Ambulance: ' + h.ambulance_id + ' | ETA: ' + (h.eta_minutes ?? '?') + ' min';
        card.appendChild(meta);

        const vitals = document.createElement('pre');
        vitals.textContent = JSON.stringify(h.vital_signs, null, 2);
        card.appendChild(vitals);

        const btn = document.createElement('button');
        btn.textContent = 'Acknowledge';
        btn.addEventListener('click', () => ack(h.handoff_id));
        card.appendChild(btn);

        app.appendChild(card);
      }
    }

    async function ack(id) {
      await fetch(`/handoffs/${encodeURIComponent(id)}/ack`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      loadHandoffs();
    }

    loadHandoffs();
    setInterval(loadHandoffs, 5000);
  </script>
</body>
</html>
