name: Build Release Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to attach installers to (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    needs: build-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyinstaller

      - name: Download Tauri macOS artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974aafe893c5d4f11d96269 # v4
        with:
          name: tauri-bundle-macos-latest
          path: cliniclink-desktop/src-tauri/target/release/bundle/macos

      - name: Build macOS installer
        run: python scripts/build_macos_installer.py

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload "$TAG" \
            build/Return42-ClinicLink-*-macOS.pkg \
            build/Return42-ClinicLink-*-macOS.dmg \
            --clobber

  build-linux:
    runs-on: ubuntu-latest
    needs: build-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyinstaller

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Download Tauri Linux artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974aafe893c5d4f11d96269 # v4
        with:
          name: tauri-bundle-ubuntu-latest
          path: cliniclink-desktop/src-tauri/target/release

      - name: Build Linux installer
        run: python scripts/build_linux_installer.py

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload "$TAG" \
            build/Return42-ClinicLink-*-linux-x86_64.deb \
            build/Return42-ClinicLink-*-linux-x86_64.tar.gz \
            --clobber

  build-windows:
    runs-on: windows-latest
    needs: build-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyinstaller

      - name: Build Windows binaries
        run: |
          pyinstaller --onefile --name r42-cliniclink --distpath build\installer\bin scripts\windows_entrypoints\r42-cliniclink.py
          pyinstaller --onefile --name r42-observe --distpath build\installer\bin scripts\windows_entrypoints\r42-observe.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Download Tauri Windows artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974aafe893c5d4f11d96269 # v4
        with:
          name: tauri-bundle-windows-latest
          path: cliniclink-desktop/src-tauri/target/release

      - name: Build Windows installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" scripts\build_windows_installer.iss

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if (-not $tag) { $tag = "${{ github.ref_name }}" }
          gh release upload $tag build\Return42-ClinicLink-*-Windows-x86_64.exe --clobber

  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: ''
          - platform: 'ubuntu-latest'
            args: ''
          - platform: 'windows-latest'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pyinstaller

      - name: Build sidecar binary
        shell: bash
        run: |
          pyinstaller --onefile --name r42-cliniclink --distpath dist scripts/windows_entrypoints/r42-cliniclink.py
          mkdir -p cliniclink-desktop/src-tauri/sidecars
          if [ -f dist/r42-cliniclink.exe ]; then
            cp dist/r42-cliniclink.exe cliniclink-desktop/src-tauri/sidecars/r42-cliniclink
          else
            cp dist/r42-cliniclink cliniclink-desktop/src-tauri/sidecars/r42-cliniclink
          fi

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'cliniclink-desktop/package-lock.json'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # stable
        with:
          toolchain: stable

      - name: Install Linux Tauri dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        working-directory: ./cliniclink-desktop
        run: npm ci

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@fce9c6108b31ea247710505d3aaaa893ee6768d4 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./cliniclink-desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'ClinicLink Desktop ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Tauri bundle artifact
        uses: actions/upload-artifact@65c4c20a1fa945b0746b6eb9825c2b6b38d18c16 # v4
        with:
          name: tauri-bundle-${{ matrix.platform }}
          path: |
            cliniclink-desktop/src-tauri/target/release/bundle/macos/ClinicLink Desktop.app
            cliniclink-desktop/src-tauri/target/release/cliniclink-desktop
            cliniclink-desktop/src-tauri/target/release/cliniclink-desktop.exe
          if-no-files-found: ignore
