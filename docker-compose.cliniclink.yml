services:
  cliniclink-gateway:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY pyproject.toml ./
        COPY src ./src
        RUN pip install -e ".[dev]"
        CMD ["r42-cliniclink", "gateway", "--node-id", "clinic-a", "--transport", "mqtt"]
    ports:
      - "8000:8000"
    environment:
      - NODE_ID=clinic-a
      # Set NODE_SIGNING_KEY from your environment, or mount it as a Docker secret
      # (see the ClinicLink runbook). A persistent key gives ambulances a stable
      # clinic identity to trust across restarts.
      - NODE_SIGNING_KEY=${NODE_SIGNING_KEY:-}
      - EVIDENCE_LOG_DIR=/app/evidence
      - CLINICLINK_DB_PATH=/app/data/cliniclink.db
      - CLINICLINK_QUEUE_DB_PATH=/app/data/cliniclink_queue.db
      - CLINIC_TOKEN=${CLINIC_TOKEN:-clinic-local-token}
      - CLINICLINK_ADMIN_TOKEN=${CLINICLINK_ADMIN_TOKEN:-${CLINIC_TOKEN:-clinic-local-token}}
      - TRUSTED_PEERS=${TRUSTED_PEERS:-}
      - TRUST_ON_FIRST_USE=${TRUST_ON_FIRST_USE:-0}
      - CLINICLINK_HEARTBEAT_INTERVAL=${CLINICLINK_HEARTBEAT_INTERVAL:-5.0}
    volumes:
      - ./evidence:/app/evidence
      - cliniclink-data:/app/data
    # Example Docker secret mount for the clinic signing key:
    # secrets:
    #   - clinic_signing_key

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

volumes:
  cliniclink-data:

# Example secret definition for NODE_SIGNING_KEY. Create the file outside of
# version control and reference it with `docker compose --env-file .env up`.
# secrets:
#   clinic_signing_key:
#     file: ./secrets/clinic_signing_key.txt
